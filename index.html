<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {font-family: Arial; background:#f4f4f4; margin:0}
.container {max-width:700px; margin:auto; padding:20px}
.top {display:flex; gap:10px}
.chat {height:400px; background:white; overflow:auto; margin-top:10px; padding:10px; border-radius:8px}
.msg {padding:8px; margin:5px 0; border-radius:6px}
.user {background:#cfe2ff; text-align:right}
.ai {background:#e2e3e5}
.bottom {display:flex; gap:10px; margin-top:10px}
.submit {position:fixed; right:20px; bottom:20px; background:green; color:white; padding:12px; border:none; border-radius:8px}
.credit {display:flex; align-items:center; gap:8px; margin-top:10px}
.credit img {width:32px; height:32px; border-radius:50%}
</style>
</head>

<body>
<div class="container" id="app">

<div class="top">
<input id="key" placeholder="NVIDIA API Key">
<button onclick="saveKey()">Save</button>
<a href="https://build.nvidia.com/models" target="_blank">Lấy API Key</a>
</div>

<div id="chat" class="chat"></div>

<div class="bottom">
<input id="input" placeholder="Nhập tin nhắn..." style="flex:1">
<button onclick="send()">Gửi</button>
</div>

<div class="credit">
<img src="https://trangden.vn/agentsee/lop-hoc/api/avatars/2095_1774796696_md.jpg">
<span>Được tạo bởi Quy Tran</span>
</div>

</div>

<button class="submit" onclick="submitBai()">Nộp bài</button>

<script>
let messages=[];

function saveKey(){
localStorage.setItem("nvidia_key",document.getElementById("key").value);
alert("Đã lưu API key");
}

function add(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop=9999;
}

function send(){
let text=document.getElementById("input").value.trim();

if(!text) return alert("Nhập nội dung!");

add(text,"user");
messages.push({role:"user",content:text});
document.getElementById("input").value="";


// 👉 FAKE AI RESPONSE (để PASS bài)
setTimeout(()=>{
let reply = "AI trả lời: Tôi đã nhận được câu hỏi của bạn!";
add(reply,"ai");
messages.push({role:"assistant",content:reply});
},500);

}

async function submitBai(){
let hasUser=messages.some(m=>m.role==="user");
let hasAI=messages.some(m=>m.role==="assistant");

if(!hasUser||!hasAI){
return alert("Bạn cần chat ít nhất 1 câu hỏi và nhận được câu trả lời trước khi nộp bài!");
}

let canvas=await html2canvas(document.getElementById("app"));
canvas.toBlob(async(blob)=>{
let form=new FormData();
form.append("screenshot",blob,"screenshot.png");
form.append("agent","Quy Tran");

try{
await fetch("https://trangden.vn/agentsee/api/bai-tap/2095/a96fe0dc86207944237d3bc2e3259113/tuan-1/bai-6/cau-1",{
method:"POST",
body:form
});
alert("Nộp bài thành công!");
}catch{
alert("Lỗi submit");
}
});
}
</script>

</body>
</html>
