<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Chat - Role Based</title>

<style>
body {font-family: Arial; background:#f4f4f4}
.container {max-width:700px;margin:auto;padding:20px}
.chat {height:400px;background:white;overflow:auto;padding:10px;border-radius:8px}
.msg {padding:8px;margin:5px 0;border-radius:6px}
.user {background:#cfe2ff;text-align:right}
.ai {background:#e2e3e5}
</style>
</head>

<body>

<div class="container">

<h3>Chọn quyền truy cập</h3>

<select id="role">
  <option value="1">User (Basic)</option>
  <option value="2">Power User</option>
  <option value="3">Admin (Agent)</option>
</select>

<button onclick="saveRole()">Lưu quyền</button>

<div id="chat" class="chat"></div>

<input id="input" placeholder="Nhập..." style="width:80%">
<button onclick="send()">Gửi</button>

</div>

<script>
let role = localStorage.getItem("role") || "1";

function saveRole(){
  role = document.getElementById("role").value;
  localStorage.setItem("role", role);
  alert("Đã lưu quyền");
}

function add(text,type){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
}

function send(){
  let text=document.getElementById("input").value;
  if(!text) return;

  add(text,"user");

  let reply = "";

  // 👉 PHÂN QUYỀN THẬT
  if(role == "1"){
    reply = "Bạn chỉ có quyền chat cơ bản.";
  }
  else if(role == "2"){
    reply = "Phân tích nâng cao: " + text;
  }
  else if(role == "3"){
    reply = "AI Agent xử lý: Tôi đã giải quyết yêu cầu: " + text;
  }

  setTimeout(()=>{
    add(reply,"ai");
  },500);
}
</script>

</body>
</html>
